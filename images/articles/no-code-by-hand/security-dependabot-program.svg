<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" role="img" aria-label="Security remediation layered approach">
<defs><style>
text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
.v { font-weight: 700; font-size: 14px; fill: #0f172a; }
.vl { font-weight: 700; font-size: 14px; fill: #ffffff; }
.cat { font-weight: 600; font-size: 13px; fill: #334155; }
.sm { font-weight: 500; font-size: 11px; fill: #64748b; }
.sm-dark { font-weight: 500; font-size: 11px; fill: #334155; }
.smb { font-weight: 600; font-size: 11px; fill: #64748b; }
.ax { stroke: #cbd5e1; stroke-width: 1; }
.grid { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 3; }
.box-label { font-weight: 700; font-size: 12px; fill: #ffffff; }
.box-sub { font-weight: 500; font-size: 11px; fill: rgba(255,255,255,0.85); }
.heading { font-weight: 700; font-size: 13px; fill: #334155; }
.heading-sm { font-weight: 600; font-size: 12px; fill: #64748b; }
.good { font-weight: 600; font-size: 11px; fill: #059669; }
.bad { font-weight: 600; font-size: 11px; fill: #dc2626; }
</style></defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="20" y="40" class="heading">Layer 1</text>
<text x="20" y="56" class="sm">Dep + CVE waves</text>
<rect x="150.0" y="20" width="204.7" height="50" rx="6" fill="#1e3a5f"/>
<text x="252.3" y="49.0" text-anchor="middle" class="vl" style="font-size:11px">Wave 1: Critical</text>
<rect x="362.7" y="20" width="204.7" height="50" rx="6" fill="#2d5f8f"/>
<text x="465.0" y="49.0" text-anchor="middle" class="vl" style="font-size:11px">Wave 2: Crypto chain</text>
<rect x="575.3" y="20" width="204.7" height="50" rx="6" fill="#0d9488"/>
<text x="677.7" y="49.0" text-anchor="middle" class="vl" style="font-size:11px">Wave 3: Transitive</text>
<text x="20" y="102" class="heading">Layer 2</text>
<text x="20" y="118" class="sm">Workflow hardening</text>
<rect x="150.0" y="82" width="311.0" height="50" rx="6" fill="#64748b"/>
<text x="305.5" y="111.0" text-anchor="middle" class="vl" style="font-size:11px">CI input sanitized</text>
<rect x="469.0" y="82" width="311.0" height="50" rx="6" fill="#64748b"/>
<text x="624.5" y="111.0" text-anchor="middle" class="vl" style="font-size:11px">PII removed from telemetry</text>
<text x="20" y="164" class="heading">Layer 3</text>
<text x="20" y="180" class="sm">Release closures</text>
<rect x="150.0" y="144" width="630.0" height="50" rx="6" fill="#059669"/>
<text x="465.0" y="173.0" text-anchor="middle" class="vl" style="font-size:11px">Faster, safer dependency closure with no delivery churn</text>
</svg>