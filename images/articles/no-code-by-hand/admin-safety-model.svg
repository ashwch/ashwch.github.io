<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="800" height="130" role="img" aria-label="Admin action safety model">
<defs><style>
text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
.v { font-weight: 700; font-size: 14px; fill: #0f172a; }
.vl { font-weight: 700; font-size: 14px; fill: #ffffff; }
.cat { font-weight: 600; font-size: 13px; fill: #334155; }
.sm { font-weight: 500; font-size: 11px; fill: #64748b; }
.sm-dark { font-weight: 500; font-size: 11px; fill: #334155; }
.smb { font-weight: 600; font-size: 11px; fill: #64748b; }
.ax { stroke: #cbd5e1; stroke-width: 1; }
.grid { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 3; }
.box-label { font-weight: 700; font-size: 12px; fill: #ffffff; }
.box-sub { font-weight: 500; font-size: 11px; fill: rgba(255,255,255,0.85); }
.heading { font-weight: 700; font-size: 13px; fill: #334155; }
.heading-sm { font-weight: 600; font-size: 12px; fill: #64748b; }
.good { font-weight: 600; font-size: 11px; fill: #059669; }
.bad { font-weight: 600; font-size: 11px; fill: #dc2626; }
</style></defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<rect x="20" y="10" width="372" height="110" rx="8" fill="#f8fafc" stroke="#fca5a5" stroke-width="1.5"/>
<text x="34" y="34" class="bad">Before: click and pray</text>
<rect x="34" y="46" width="344" height="34" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
<text x="206.0" y="68" text-anchor="middle" class="sm-dark">Select action → immediate mutation (no undo)</text>
<text x="34" y="104" class="sm">One accidental click = irreversible data loss</text>
<rect x="408" y="10" width="372" height="110" rx="8" fill="#f8fafc" stroke="#86efac" stroke-width="1.5"/>
<text x="422" y="34" class="good">After: plan → confirm → execute</text>
<rect x="422.0" y="46" width="109.3" height="34" rx="4" fill="#1e3a5f"/>
<text x="476.7" y="68" text-anchor="middle" class="vl" style="font-size:10px">Review impact</text>
<rect x="539.3" y="46" width="109.3" height="34" rx="4" fill="#2d5f8f"/>
<text x="594.0" y="68" text-anchor="middle" class="vl" style="font-size:10px">Confirm scope</text>
<rect x="656.7" y="46" width="109.3" height="34" rx="4" fill="#059669"/>
<text x="711.3" y="68" text-anchor="middle" class="vl" style="font-size:10px">Execute</text>
<text x="422" y="104" class="sm">Eligibility checks + risk context before any mutation</text>
</svg>