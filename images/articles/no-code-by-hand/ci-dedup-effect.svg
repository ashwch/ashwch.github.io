<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" role="img" aria-label="CI deduplication: push vs PR trigger ratio">
<defs><style>
text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
.v { font-weight: 700; font-size: 14px; fill: #0f172a; }
.vl { font-weight: 700; font-size: 14px; fill: #ffffff; }
.cat { font-weight: 600; font-size: 13px; fill: #334155; }
.sm { font-weight: 500; font-size: 11px; fill: #64748b; }
.sm-dark { font-weight: 500; font-size: 11px; fill: #334155; }
.smb { font-weight: 600; font-size: 11px; fill: #64748b; }
.ax { stroke: #cbd5e1; stroke-width: 1; }
.grid { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 3; }
.box-label { font-weight: 700; font-size: 12px; fill: #ffffff; }
.box-sub { font-weight: 500; font-size: 11px; fill: rgba(255,255,255,0.85); }
.heading { font-weight: 700; font-size: 13px; fill: #334155; }
.heading-sm { font-weight: 600; font-size: 12px; fill: #64748b; }
.good { font-weight: 600; font-size: 11px; fill: #059669; }
.bad { font-weight: 600; font-size: 11px; fill: #dc2626; }
</style></defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="210.0" y="30" text-anchor="middle" class="heading">Before dedup</text>
<rect x="30" y="46" width="293.8" height="100" fill="#be123c" rx="4"/>
<text x="176.9" y="101.0" text-anchor="middle" class="vl">399 push</text>
<rect x="323.8" y="46" width="16.2" height="100" fill="#0d9488" rx="4"/>
<text x="348.0" y="101.0" class="v">22 PR</text>
<text x="210.0" y="168" text-anchor="middle" class="sm">18x more push runs than PR runs</text>
<text x="210.0" y="186" text-anchor="middle" class="bad">Redundant work on every commit</text>
<text x="590.0" y="30" text-anchor="middle" class="heading">After dedup</text>
<rect x="410" y="46" width="72.0" height="100" fill="#be123c" rx="4"/>
<text x="446.0" y="101.0" text-anchor="middle" class="vl" style="font-size:12px">9</text>
<rect x="482.0" y="46" width="288.0" height="100" fill="#0d9488" rx="4"/>
<text x="626.0" y="101.0" text-anchor="middle" class="vl">36 PR</text>
<text x="590.0" y="168" text-anchor="middle" class="sm">0.25x ratio - only meaningful runs</text>
<text x="590.0" y="186" text-anchor="middle" class="good">Redundant runs eliminated</text>
<line x1="400" y1="40" x2="400" y2="156" stroke="#e2e8f0" stroke-width="1"/>
</svg>