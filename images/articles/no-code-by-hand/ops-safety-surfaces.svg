<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 230" width="800" height="230" role="img" aria-label="Operational safety surfaces before and after">
<defs><style>
text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
.v { font-weight: 700; font-size: 14px; fill: #0f172a; }
.vl { font-weight: 700; font-size: 14px; fill: #ffffff; }
.cat { font-weight: 600; font-size: 13px; fill: #334155; }
.sm { font-weight: 500; font-size: 11px; fill: #64748b; }
.sm-dark { font-weight: 500; font-size: 11px; fill: #334155; }
.smb { font-weight: 600; font-size: 11px; fill: #64748b; }
.ax { stroke: #cbd5e1; stroke-width: 1; }
.grid { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 3; }
.box-label { font-weight: 700; font-size: 12px; fill: #ffffff; }
.box-sub { font-weight: 500; font-size: 11px; fill: rgba(255,255,255,0.85); }
.heading { font-weight: 700; font-size: 13px; fill: #334155; }
.heading-sm { font-weight: 600; font-size: 12px; fill: #64748b; }
.good { font-weight: 600; font-size: 11px; fill: #059669; }
.bad { font-weight: 600; font-size: 11px; fill: #dc2626; }
</style></defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<rect x="20.0" y="20.0" width="373.0" height="88.0" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="32.0" y="42.0" class="heading">Snapshot ops</text>
<text x="32.0" y="64.0" class="bad">✗ Manual runbook steps</text>
<text x="32.0" y="82.0" class="good">✓ Scripted flow + alerts</text>
<rect x="407.0" y="20.0" width="373.0" height="88.0" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="419.0" y="42.0" class="heading">Support shell</text>
<text x="419.0" y="64.0" class="bad">✗ Unclear failure modes</text>
<text x="419.0" y="82.0" class="good">✓ Diagnostics + auto-reconcile</text>
<rect x="20.0" y="122.0" width="373.0" height="88.0" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="32.0" y="144.0" class="heading">Admin commands</text>
<text x="32.0" y="166.0" class="bad">✗ Raw shell folklore</text>
<text x="32.0" y="184.0" class="good">✓ Allowlisted queue + audit</text>
<rect x="407.0" y="122.0" width="373.0" height="88.0" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<text x="419.0" y="144.0" class="heading">High-impact actions</text>
<text x="419.0" y="166.0" class="bad">✗ Single-step mutation</text>
<text x="419.0" y="184.0" class="good">✓ Two-step confirmation</text>
</svg>